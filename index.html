<!doctype html>
<meta charset='utf-8'>
<title>Baby Violet's Books</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
<link rel='stylesheet' href='style.css'>

<div class='container'>
  <div class='banner'>🎉 Happy 100 Days! 🎉</div>
  
  <h1>💜 Baby Violet's Books</h1>

  <div class='controls'>
    <div class='control-group'>
      <input type='text' id='bookInput' placeholder='Enter book name...' />
      <button onclick='addBook()'>Add Book</button>
    </div>
    
    <div class='bought-by-control'>
      <label for='boughtByDropdown'>Who bought it?</label>
      <div class='bought-by-inputs'>
        <select id='boughtByDropdown' onchange='handleBoughtByChange()'>
          <option value=''>Select someone...</option>
        </select>
        <input type='text' id='customBoughtByInput' placeholder='Enter name...' style='display: none;' />
      </div>
    </div>
    
    <div class='action-buttons'>
      <button onclick='toggleSearch()'>🔍 Search</button>
      <button onclick='toggleBulkMode()'>📝 Bulk Add</button>
      <button id='sortBtn' onclick='toggleSortBy()'>📅 Sort by Date</button>
      <button id='detailsBtn' onclick='toggleDetails()'>👁️ Hide Details</button>
      <button onclick='toggleDeleteMode()'>🗑️ Delete</button>
      <button onclick='toggleSettings()'>⚙️ Manage</button>
    </div>
  </div>

  <div id='bookList'></div>

  <div id='bulkSection' class='bulk-section' style='display: none;'>
    <h3>Bulk Add Books</h3>
    <p>Paste or type book names below (one per line):</p>
    <textarea id='bulkBooksTextarea' placeholder='The Very Hungry Caterpillar
Winnie the Pooh
Charlotte's Web'></textarea>
    
    <div class='bulk-buyer-control'>
      <label for='bulkBoughtByDropdown'>Who bought these books?</label>
      <div class='bulk-buyer-inputs'>
        <select id='bulkBoughtByDropdown' onchange='handleBulkBoughtByChange()'>
          <option value=''>Select someone...</option>
        </select>
        <input type='text' id='bulkCustomBoughtByInput' placeholder='Enter name...' style='display: none;' />
      </div>
    </div>
    
    <div class='bulk-buttons'>
      <button onclick='addBulkBooks()'>Add All Books</button>
      <button onclick='toggleBulkMode()' style='background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);'>Cancel</button>
    </div>
  </div>

  <div id='searchSection' style='display: none; margin-bottom: 20px;'>
    <input type='text' id='searchInput' placeholder='Search books...' onkeyup='searchBooks()' />
    <div id='searchResults' class='search-results'></div>
  </div>

  <div id='settingsSection' class='settings-section' style='display: none;'>
    <div class='settings-password'>
      <label for='settingsPassword'>Enter password:</label>
      <input type='password' id='settingsPassword' placeholder='Password' />
      <button onclick='unlockSettings()'>Unlock</button>
    </div>

    <div id='settingsContent' class='settings-content' style='display: none;'>
      <button class='close-settings' onclick='toggleSettings()'>✕</button>
      <h3>📋 Manage Buyers</h3>
      <div class='settings-inner'>
        <div class='buyer-list'>
          <h4>Current Buyers:</h4>
          <div id='buyersList'></div>
        </div>
        <div class='add-buyer'>
          <label for='newBuyerInput'>Add New Buyer:</label>
          <div class='add-buyer-inputs'>
            <input type='text' id='newBuyerInput' placeholder='Enter name...' />
            <button onclick='addBuyer()'>Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src='app.js'></script>
