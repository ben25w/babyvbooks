<!doctype html>
<meta charset='utf-8'>
<title>Baby Violet's Books</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap' rel='stylesheet'>
<link rel='stylesheet' href='style.css'>

<div class='container'>
  <div class='banner'>🎉 Happy 100 Days! 🎉</div>
  
  <h1>💜 Baby Violet's Books</h1>

  <div class='controls'>
    <div class='control-group'>
      <input type='text' id='bookInput' placeholder='Enter book name...' />
      <button onclick='addBook()'>Add Book</button>
    </div>
    
    <div class='action-buttons'>
      <button onclick='toggleSearch()'>🔍 Search</button>
      <button onclick='toggleBulkMode()'>📝 Bulk Add</button>
      <button id='sortBtn' onclick='toggleSortBy()'>📅 Sort by Date</button>
      <button onclick='toggleDeleteMode()'>🗑️ Delete</button>
    </div>
  </div>

  <div class='main-content'>
    <div id='bookList'></div>
    
    <div id='boughtBySection' class='bought-by-section'>
      <label for='boughtByDropdown'>Who bought it?</label>
      <select id='boughtByDropdown' onchange='handleBoughtByChange()'>
        <option value=''>Select someone...</option>
        <option value='Mum'>Mum</option>
        <option value='Dad'>Dad</option>
        <option value='Grandma'>Grandma</option>
        <option value='Grandpa'>Grandpa</option>
        <option value='Auntie'>Auntie</option>
        <option value='Uncle'>Uncle</option>
        <option value='Other'>Other</option>
      </select>
      <input type='text' id='customBoughtByInput' placeholder='Enter name...' style='display: none;' />
    </div>
  </div>

  <div id='bulkSection' class='bulk-section' style='display: none;'>
    <h3>Bulk Add Books</h3>
    <p>Paste or type book names below (one per line):</p>
    <textarea id='bulkBooksTextarea' placeholder='The Very Hungry Caterpillar
Winnie the Pooh
Charlotte's Web'></textarea>
    <div class='bulk-buttons'>
      <button onclick='addBulkBooks()'>Add All Books</button>
      <button onclick='toggleBulkMode()' style='background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);'>Cancel</button>
    </div>
  </div>

  <div id='searchSection' style='display: none; margin-bottom: 20px;'>
    <input type='text' id='searchInput' placeholder='Search books...' onkeyup='searchBooks()' />
    <div id='searchResults' class='search-results'></div>
  </div>
</div>

<script src='app.js'></script>
